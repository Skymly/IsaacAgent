name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Or what workflow does it improve?
      placeholder: "When I try to do X, I have to manually..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to happen instead?
      placeholder: "It would be great if IsaacAgent could..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've tried.

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - Agent Tools
        - UI / UX
        - RAG / Knowledge Base
        - LLM Provider Support
        - Isaac-specific Feature
        - Developer Experience
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, links, examples, or anything else relevant.
