name: Build and Test

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full CI on Windows: format check + full solution build (incl. App) + tests.
  # Official support is Windows-only (ADR-003); no cross-platform library CI.
  ci-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required by MinVer (Git-tag-based versioning).
          fetch-depth: 0

      - name: Setup .NET SDK
        id: setup-dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run full CI via Nuke (CiAll)
        env:
          # dotnet format internally spawns a child process to load the
          # workspace; on runners with multiple .NET runtimes pre-installed
          # (e.g. .NET 10 runtime alongside the .NET 8 SDK), the child
          # process can fail to locate the correct SDK. DOTNET_ROOT ensures
          # it finds the right one.
          DOTNET_ROOT: ${{ steps.setup-dotnet.outputs.dotnet-path }}
        run: dotnet run --project build/_build.csproj -- --root . --target CiAll --configuration Release

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: TestResults/
          if-no-files-found: warn

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-windows
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  # Release build: publish self-contained Windows executable on tag pushes.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ci-windows]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required by MinVer (Git-tag-based versioning).
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run release pipeline via Nuke (Release)
        run: dotnet run --project build/_build.csproj -- --root . --target Release --configuration Release

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: IsaacAgent-win-x64
          path: artifacts/publish/win-x64/
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/publish/win-x64/IsaacAgent.exe
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
