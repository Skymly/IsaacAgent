name: Build and Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore IsaacAgent.sln

      - name: Build
        run: dotnet build IsaacAgent.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test IsaacAgent.sln --no-build --configuration Release --verbosity normal
